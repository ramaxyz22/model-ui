    <style>
        * {

            padding: 0;
            box-sizing: border-box;

        body {

            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Light Theme (Default) */
        body.light {
            background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf3 100%);
            color: #1d1c1d;
        }

        /* Dark Theme */
        body.dark {

            color: #ffffff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
        }

        .toggle-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 60px;
            padding: 8px;
            display: flex;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .toggle-option {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-option.active {
            background: #007aff;
            color: white;
        }

        body.dark .toggle-option.active {
            background: #0a84ff;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.3);
        }

        body.dark .header {
            background: rgba(30,30,30,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: 64px;
            font-weight: 600;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
        }

        body.light .header h1 {
            background: linear-gradient(135deg, #1a1a1a, #4a4a4a);
            
            -webkit-text-fill-color: transparent;
        }

        body.dark .header h1 {
            background: linear-gradient(135deg, #ffffff, #a0a0a0);
           
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 22px;
            opacity: 0.8;
            font-weight: 400;
            letter-spacing: -0.3px;
        }

        .stats {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stats span {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            padding: 10px 28px;
            border-radius: 100px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.3);
        }

        body.dark .stats span {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
        }

        /* Card */
        .card {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 36px;

            background: rgba(30,30,30,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        }

        .card h3 {
            font-weight: 590;
            font-size: 20px;
            margin-bottom: 24px;
            padding-left: 8px;
            border-left: 4px solid #007aff;
        }

        .preview {
            min-height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.4);
        }

        body.dark .preview {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);

        .code-box pre {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 12px;
            color: #f0f0f0;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
            margin-bottom: 40px;

        .copy-btn {
            position: absolute;
            bottom: 14px;
            right: 14px;
            background: #007aff;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;

            display: flex;
            align-items: center;
            gap: 8px;

            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
            font-family: 'SF Pro Text', sans-serif;
        }

        .copy-btn:hover {
            background: #005fc7;
            transform: scale(1.02);
        }

        .toast {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: rgba(30,30,30,0.9);
            backdrop-filter: blur(20px);
            color: white;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(450px);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
            z-index: 999;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 16px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .b1 {
            background: #007aff;
            color: white;

        .b1:active::after {
            width: 200px;
            height: 200px;
        }
        .b1:active {
            transform: scale(0.97);
        }

        .b4:active {

            font-size: 17px;

            cursor: pointer;
            transition: transform 0.1s;
            font-family: 'SF Pro Text', sans-serif;
        }
        .b6:active {

        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-3px); }
            100% { transform: translateX(0); }
        }

        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 9. Tilt */
        .b9 {
            background: #30b0c0;
            color: white;

        /* 10. Bounce */

        @keyframes bounce {
            0% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0); }

        /* 11. Collapse */
        .b11 {

            font-weight: 500;

            transition: transform 0.3s;
            font-family: 'SF Pro Text', sans-serif;

            animation: flash 0.2s;
        }
        @keyframes flash {

            { name: "07. Glow", btnClass: "b7", html: `<button class="b7">Glow</button>`, css: `.b7 {\n  background: #ff6482;\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 30px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: box-shadow 0.2s, transform 0.2s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b7:active {\n  box-shadow: 0 0 30px #ff6482;\n  transform: scale(0.97);\n}` },
            { name: "08. Pulse", btnClass: "b8", html: `<button class="b8">Pulse</button>`, css: `.b8 {\n  background: #5e5ce0;\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 16px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: transform 0.1s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b8:active {\n  animation: pulse 0.3s ease;\n}\n@keyframes pulse {\n  0% { transform: scale(1); }\n  50% { transform: scale(1.1); }\n  100% { transform: scale(1); }\n}` },
            { name: "09. Tilt", btnClass: "b9", html: `<button class="b9">Tilt</button>`, css: `.b9 {\n  background: #30b0c0;\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 12px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: transform 0.2s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b9:active {\n  transform: perspective(100px) rotateX(10deg) translateY(2px);\n}` },
            { name: "10. Bounce", btnClass: "b10", html: `<button class="b10">Bounce</button>`, css: `.b10 {\n  background: #bf5af0;\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 20px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: transform 0.2s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b10:active {\n  animation: bounce 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);\n}\n@keyframes bounce {\n  0% { transform: translateY(0); }\n  50% { transform: translateY(-5px); }\n  100% { transform: translateY(0); }\n}` },
            { name: "11. Collapse", btnClass: "b11", html: `<button class="b11">Collapse</button>`, css: `.b11 {\n  background: #ff3b30;\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 30px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: transform 0.1s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b11:active {\n  transform: scale(0.9, 0.8);\n}` },
            { name: "12. Flip", btnClass: "b12", html: `<button class="b12">Flip</button>`, css: `.b12 {\n  background: #007aff;\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 16px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: transform 0.3s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b12:active {\n  transform: rotateY(180deg);\n}` },
            { name: "13. Stretch", btnClass: "b13", html: `<button class="b13">Stretch</button>`, css: `.b13 {\n  background: #34c759;\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 25px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: transform 0.15s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b13:active {\n  transform: scale(1.1, 0.9);\n}` },
              { name: "14. Ring", btnClass: "b14", html: `<button class="b14">Ring</button>`, css: `.b14 {\n  background: #ff9500;\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 12px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: box-shadow 0.2s, transform 0.2s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b14:active {\n  box-shadow: 0 0 0 8px rgba(255,149,0,0.3);\n  transform: scale(0.97);\n}` },
            { name: "15. Wobble", btnClass: "b15", html: `<button class="b15">Wobble</button>`, css: `.b15 {\n  background: #af52de;\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 30px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: transform 0.1s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b15:active {\n  animation: wobble 0.2s ease;\n}\n@keyframes wobble {\n  0% { transform: rotate(0deg); }\n  25% { transform: rotate(3deg); }\n  50% { transform: rotate(-3deg); }\n  75% { transform: rotate(1deg); }\n  100% { transform: rotate(0deg); }\n}` },
            { name: "16. Drop", btnClass: "b16", html: `<button class="b16">Drop</button>`, css: `.b16 {\n  background: #ff6482;\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 8px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: transform 0.2s, box-shadow 0.2s;\n  font-family: 'SF Pro Text', sans-serif;\n  box-shadow: 0 5px 0 #b2455a;\n}\n.b16:active {\n  transform: translateY(4px);\n  box-shadow: 0 1px 0 #b2455a;\n}` },
            { name: "17. Jelly", btnClass: "b17", html: `<button class="b17">Jelly</button>`, css: `.b17 {\n  background: #5856d6;\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 30px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: transform 0.2s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b17:active {\n  animation: jelly 0.3s ease;\n}\n@keyframes jelly {\n  0% { transform: scale(1, 1); }\n  30% { transform: scale(1.1, 0.9); }\n  60% { transform: scale(0.9, 1.1); }\n  100% { transform: scale(1, 1); }\n}` },
            { name: "18. Flash", btnClass: "b18", html: `<button class="b18">Flash</button>`, css: `.b18 {\n  background: #ff3b30;\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 20px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: background 0.1s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b18:active {\n  background: #ff6b6b;\n  animation: flash 0.2s;\n}\n@keyframes flash {\n  0% { opacity: 1; }\n  50% { opacity: 0.5; }\n  100% { opacity: 1; }\n}` },
            { name: "19. Swing", btnClass: "b19", html: `<button class="b19">Swing</button>`, css: `.b19 {\n  background: #d946ef;\n  color: white;\n  border: none;\n  padding: 14px 38px;\n  border-radius: 8px;\n  font-weight: 500;\n  font-size: 17px;\n  cursor: pointer;\n  transition: transform 0.2s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b19:active {\n  animation: swing 0.3s ease;\n}\n@keyframes swing {\n  0% { transform: rotate(0deg); }\n  25% { transform: rotate(5deg); }\n  50% { transform: rotate(-5deg); }\n  75% { transform: rotate(2deg); }\n  100% { transform: rotate(0deg); }\n}` },
            { name: "20. Morph + Ripple", btnClass: "b20", html: `<button class="b20">Morph</button>`, css: `.b20 {\n  background: linear-gradient(145deg, #007aff, #5856d6);\n  color: white;\n  border: none;\n  padding: 14px 36px;\n  border-radius: 16px;\n  font-size: 17px;\n  font-weight: 500;\n  cursor: pointer;\n  position: relative;\n  overflow: hidden;\n  transition: border-radius 0.3s, transform 0.2s;\n  font-family: 'SF Pro Text', sans-serif;\n}\n.b20::after {\n  content: '';\n  position: absolute;\n  top: 50%;\n  left: 50%;\n  width: 0;\n  height: 0;\n  border-radius: 50%;\n  background: rgba(255,255,255,0.4);\n  transform: translate(-50%, -50%);\n  transition: width 0.4s, height 0.4s;\n}\n.b20:active::after {\n  width: 300px;\n  height: 300px;\n}\n.b20:active {\n  border-radius: 30px;\n  transform: scale(0.96);\n}` }
        ];

        const grid = document.getElementById('buttonGrid');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const toggleOptions = document.querySelectorAll('.toggle-option');

        // Theme Toggle
        toggleOptions.forEach(option => {
            option.addEventListener('click', () => {
                toggleOptions.forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
                document.body.className = option.dataset.theme;
            });
        });

        function showToast(msg) {
            toastMsg.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function renderButtons() {
            grid.innerHTML = '';
            buttonData.forEach((btn, idx) => {
                const card = document.createElement('div');
                card.className = 'card';

                card.innerHTML = `
                    <h3>${btn.name}</h3>
                    <div class="preview">
                        ${btn.html}
                    </div>
                    <div class="code-box">
                        <pre id="code-${idx}">${btn.css.replace(/</g, '&lt;')}</pre>
                        <button class="copy-btn" data-idx="${idx}"><i class="far fa-clipboard"></i> Copy Code</button>
                    </div>
                `;

                grid.appendChild(card);
            });

            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = e.currentTarget.dataset.idx;
                    const code = buttonData[idx].css;
                    navigator.clipboard.writeText(code).then(() => {
                        showToast('Code copied to clipboard');
                        const icon = e.currentTarget.querySelector('i');
                        icon.className = 'fas fa-check';
                        setTimeout(() => {
                            icon.className = 'far fa-clipboard';
                        }, 1500);
                    });
                });
            });
        }

        renderButtons();
    </script>
</body>
</html>
